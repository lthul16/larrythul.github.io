{{- $opts := dict "output" "htmlAndMathml" "displayMode" false -}}
{{- with try (transform.ToMath .Inner $opts) -}}
  {{- with .Err -}}
    {{- errorf "KaTeX inline render failed at %s: %s" $.Position . -}}
  {{- else -}}
    {{- $.Page.Store.Set "hasMath" true -}}
    {{ .Value }}
  {{- end -}}
{{- end -}}
