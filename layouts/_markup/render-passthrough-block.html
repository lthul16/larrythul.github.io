{{- $opts := dict "output" "htmlAndMathml" "displayMode" true -}}
{{- with try (transform.ToMath .Inner $opts) -}}
  {{- with .Err -}}
    {{- errorf "KaTeX block render failed at %s: %s" $.Position . -}}
  {{- else -}}
    {{- $.Page.Store.Set "hasMath" true -}}
    <div class="math-block">{{ .Value }}</div>
  {{- end -}}
{{- end -}}
