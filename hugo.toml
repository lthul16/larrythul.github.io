baseURL = 'https://larrythul.com/'
languageCode = 'en-us'
title = 'Larry Thul'
# PaperMod: git submodule at themes/PaperMod (see .gitmodules). With Go installed you may
# alternatively use Hugo Modules: hugo mod init <module-path> && hugo mod get github.com/adityatelange/hugo-PaperMod
theme = 'PaperMod'

defaultTheme = "light"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[params]
    env = "production"
    title = "Larry Thul"
    hideSiteHeader = false
    disableThemeToggle = true
    # Eggshell white background hex: #F0EAD6 or #F9F8F4
    # We will apply the font via CSS, but let's set the theme colors here
    [params.assets]
        favicon = "/favicon.svg"
        favicon16x16 = "/favicon.svg"
        favicon32x32 = "/favicon.svg"
        apple_touch_icon = "/favicon.svg"
        safari_pinned_tab = "/favicon.svg"

    [params.profileMode]
        enabled = true
        title = "Lawrence Thul"
        # Bio text lives in content/_index.md (easier to edit). Optional fallback if that file is empty:
        # subtitle = "Short bio here…"
        # assets/ path so Hugo can process/resize; static/ copy kept for direct URLs if needed
        imageUrl = "images/1734702873333.jpeg"
        imageWidth = 300
        imageHeight = 300

        [[params.profileMode.buttons]]
            name = "LinkedIn"
            url = "https://www.linkedin.com/in/lawrence-thul-68b212117/"
        [[params.profileMode.buttons]]
            name = "Google Scholar"
            url = "https://scholar.google.com/citations?user=IWecxBMAAAAJ"
        [[params.profileMode.buttons]]
            name = "Bio"
            url = "/bio/"
        [[params.profileMode.buttons]]
            name = "Portfolio"
            url = "/portfolio/"
        [[params.profileMode.buttons]]
            name = "Blog"
            url = "/posts/"

[menu]
    [[menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 10
    [[menu.main]]
        identifier = "bio"
        name = "Bio"
        url = "/bio/"
        weight = 20
    [[menu.main]]
        identifier = "portfolio"
        name = "Portfolio"
        url = "/portfolio/"
        weight = 30
    [[menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/posts/"
        weight = 40